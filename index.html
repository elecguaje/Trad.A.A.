<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Traductor a Alfabeto ElectrГіnico Universal</title>
<style>
    body { font-family: monospace; background-color: #0d0d0d; color: #00ffcc; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
    textarea { width: 90%; max-width: 700px; height: 120px; margin: 10px 0; font-size: 1.2em; background-color: #111; color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; }
    select, button { padding: 10px 20px; font-size: 1.2em; background-color: #00ffcc; color: #0d0d0d; border: none; cursor: pointer; margin: 5px; }
    button:hover, select:hover { background-color: #00ddb3; }
    #resultado { font-size: 1.2em; word-wrap: break-word; max-width: 90%; margin-top: 10px; }
</style>
</head>
<body>
<h2>Traductor a Alfabeto ElectrГіnico Universal</h2>
<textarea id="entrada" placeholder="Escribe o pega aquГӯ tu texto"></textarea>
<select id="modo">
    <option value="palabras-codigo">Palabras вҶ’ CГіdigo</option>
    <option value="codigo-palabras">CГіdigo вҶ’ Palabras</option>
</select>
<button onclick="traducirTexto()">Traducir</button>
<div id="resultado"></div>

<script>
const tabla = {
    'A':'вҹЎ','B':'вҢҒ','C':'вҠҡ','D':'вҢӮ','E':'вҹў','F':'вҠ№','G':'вҹЈ','H':'вҠ—','I':'вҹӮ','J':'вҢҮ',
    'K':'вҺқ','L':'вҺў','M':'вҺҡ','N':'вҺҷ','O':'вҸЈ','P':'вҺ—','Q':'вҚҫ','R':'вҺҳ','S':'вҢҒМё','T':'вҹҹ',
    'U':'вҠ”','V':'вҢө','W':'вҠ ','X':'вЁі','Y':'вҸҒ','Z':'вҢҶ',
    'a':'вҹЎ','b':'вҢҒ','c':'вҠҡ','d':'вҢӮ','e':'вҹў','f':'вҠ№','g':'вҹЈ','h':'вҠ—','i':'вҹӮ','j':'вҢҮ',
    'k':'вҺқ','l':'вҺў','m':'вҺҡ','n':'вҺҷ','o':'вҸЈ','p':'вҺ—','q':'вҚҫ','r':'вҺҳ','s':'вҢҒМё','t':'вҹҹ',
    'u':'вҠ”','v':'вҢө','w':'вҠ ','x':'вЁі','y':'вҸҒ','z':'вҢҶ',
    '0':'вҠҳ','1':'вҠұ','2':'вҠ°','3':'вҠІ','4':'вҠі','5':'вҠҙ','6':'вҠө','7':'вҠ¶','8':'вҠ·','9':'вҠё',
    'ГҒ':'вҹЎ','Гү':'вҹў','ГҚ':'вҹӮ','Г“':'вҸЈ','Гҡ':'вҠ”','Г‘':'вҺҷ',
    'ГЎ':'вҹЎ','Г©':'вҹў','Гӯ':'вҹӮ','Гі':'вҸЈ','Гә':'вҠ”','Гұ':'вҺҷ',
    '.':'В·',',':'вҖҡ','?':'вҚ°Мё','!':'вҚұМё','Вҝ':'вҚ°','ВЎ':'вҚұ',' ':' '
};

function traducirTexto() {
    const modo = document.getElementById('modo').value;
    const texto = document.getElementById('entrada').value;
    let resultado = '';

    if(modo === "palabras-codigo"){
        for(let i=0;i<texto.length;i++){
            resultado += tabla[texto[i]] || texto[i];
        }
    } else {
        const invertida = Object.fromEntries(Object.entries(tabla).map(([k,v]) => [v,k]));
        for(let i=0;i<texto.length;i++){
            resultado += invertida[texto[i]] || texto[i];
        }
    }

    document.getElementById('resultado').innerText = resultado;
}
</script>
</body>
</html>
