<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trad.A.A.</title>
</head>
<body style="background:black;color:white;font-family:monospace;padding:20px;">

<h2>Trad.A.A.</h2>

<select id="mode">
  <option value="decode" selected>Código → Texto</option>
  <option value="encode">Texto → Código</option>
</select>

<br><br>

<textarea id="input" style="width:100%;height:100px;"></textarea>
<br><br>

<button onclick="traducir()">Traducir</button>

<br><br>

<textarea id="output" style="width:100%;height:100px;"></textarea>

<script>

function traducir(){

  const mapa = {
    A:"ka", B:"zu", C:"mi", D:"po", E:"ra", F:"te", G:"vi", H:"lo", I:"na",
    J:"se", K:"di", L:"xo", M:"cu", N:"we", O:"qy", P:"gb", Q:"hj", R:"fk",
    S:"tr", T:"zz", U:"pl", V:"mn", W:"bv", X:"cx", Y:"lk", Z:"jh",
    " ":"__"
  };

  const mapaInv = {};
  for (let k in mapa){
    mapaInv[mapa[k]] = k;
  }

  const input = document.getElementById("input").value;
  const mode = document.getElementById("mode").value;

  let resultado = "";

  if(mode === "encode"){
    for(let letra of input.toUpperCase()){
      resultado += mapa[letra] || letra;
    }
  } else {
    for(let i=0;i<input.length;i+=2){
      let bloque = input.substring(i,i+2);
      resultado += mapaInv[bloque] || "?";
    }
  }

  document.getElementById("output").value = resultado;
}

</script>

</body>
</html>
