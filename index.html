<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trad.A.A.</title>
<style>
  body {
    background-color: #003300; /* verde oscuro estilo Matrix */
    color: #ccc; /* letras grises en el área vacía */
    font-family: monospace;
    padding: 20px;
  }
  h1 { color: #0f0; }
  textarea {
    width: 100%;
    height: 150px;
    background-color: #003300;
    color: #ccc;
    font-family: monospace;
    font-size: 16px;
    border: 1px solid #0f0;
    padding: 10px;
  }
  #output {
    width: 100%;
    height: 150px;
    background-color: #003300;
    color: #fff;
    font-family: monospace;
    font-size: 16px;
    border: 1px solid #0f0;
    padding: 10px;
    margin-top: 10px;
    white-space: pre-wrap;
  }
  .tab {
    cursor: pointer;
    display: inline-block;
    padding: 5px 15px;
    background-color: #0f0;
    color: #003300;
    font-weight: bold;
    margin-right: 5px;
  }
  .active {
    background-color: #00ff00;
    color: #000;
  }
</style>
</head>
<body>

<h1>Trad.A.A.</h1>

<div>
  <span class="tab active" id="tabCodeToText">Códigos → Letras</span>
  <span class="tab" id="tabTextToCode">Letras → Códigos</span>
</div>

<textarea id="inputArea" placeholder="Pega aquí tus códigos o letras..."></textarea>
<button onclick="translate()">Traducir</button>

<div id="output"></div>

<script>
  // MAPA DE CIFRADO: símbolo ↔ letra
  const codeMap = {
    '⍣':'a', '✧':'b', '⊕':'c', '⊗':'d', '⊛':'e', '⊜':'f', '⊝':'g', '⊞':'h', '⊟':'i',
    '⊠':'j', '⊡':'k', '⊢':'l', '⊣':'m', '⊤':'n', '⊥':'o', '⊦':'p', '⊧':'q', '⊨':'r',
    '⊩':'s', '⊪':'t', '⊫':'u', '⊬':'v', '⊭':'w', '⊮':'x', '⊯':'y', '⊰':'z',
    '•':' ', ',':'⸱', '?':'⁇', '!':'‼', ':':'⊹', ';':'⊷', '-':'⊶', '(':'❨', ')':'❩',
    '0':'❶','1':'❷','2':'❸','3':'❹','4':'❺','5':'❻','6':'❼','7':'❽','8':'❾','9':'❿'
  };

  let currentMode = 'codeToText'; // por defecto

  document.getElementById('tabCodeToText').addEventListener('click', function() {
    currentMode = 'codeToText';
    this.classList.add('active');
    document.getElementById('tabTextToCode').classList.remove('active');
    document.getElementById('output').innerText = '';
  });

  document.getElementById('tabTextToCode').addEventListener('click', function() {
    currentMode = 'textToCode';
    this.classList.add('active');
    document.getElementById('tabCodeToText').classList.remove('active');
    document.getElementById('output').innerText = '';
  });

  function translate() {
    const input = document.getElementById('inputArea').value;
    let output = '';

    if (currentMode === 'codeToText') {
      for (let char of input) {
        if (codeMap[char]) {
          output += codeMap[char];
        } else {
          output += char; // deja lo que no esté en el mapa
        }
      }
    } else { // textToCode
      const reverseMap = {};
      for (let key in codeMap) {
        reverseMap[codeMap[key]] = key;
      }
      for (let char of input.toLowerCase()) {
        if (reverseMap[char]) {
          output += reverseMap[char];
        } else {
          output += char;
        }
      }
    }

    document.getElementById('output').innerText = output;
  }
</script>

</body>
</html>
