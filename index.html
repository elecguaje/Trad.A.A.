<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Traductor A.A.</title>

<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 30px;
}
textarea {
    width: 80%;
    height: 120px;
    margin: 10px;
    background: #111;
    color: white;
    border: 1px solid #444;
    padding: 10px;
}
button {
    padding: 10px 20px;
    margin: 10px;
    background: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Traductor Cifrado A.A.</h1>

<textarea id="input"></textarea><br>

<button onclick="cifrar()">Cifrar →</button>
<button onclick="descifrar()">← Descifrar</button>

<textarea id="output"></textarea>

<script>

// CIFRADO SEGURO (sin símbolos raros)
const mapa = {
a:"k1", b:"x9", c:"p3", d:"m7", e:"q2",
f:"z8", g:"t4", h:"r6", i:"n5", j:"v0",
k:"y1", l:"u2", m:"b3", n:"c4", o:"d5",
p:"e6", q:"f7", r:"g8", s:"h9", t:"i0",
u:"j1", v:"l2", w:"o3", x:"s4", y:"w5",
z:"a6", " ":"00"
};

const mapaInverso = {};
for (let letra in mapa) {
    mapaInverso[mapa[letra]] = letra;
}

function cifrar() {
    let texto = document.getElementById("input").value.toLowerCase();
    let resultado = "";

    for (let i = 0; i < texto.length; i++) {
        let char = texto[i];
        resultado += mapa[char] || char;
    }

    document.getElementById("output").value = resultado;
}

function descifrar() {
    let texto = document.getElementById("input").value;
    let resultado = "";

    for (let i = 0; i < texto.length; i += 2) {
        let bloque = texto.substring(i, i + 2);
        resultado += mapaInverso[bloque] || "?";
    }

    document.getElementById("output").value = resultado;
}

</script>

</body>
</html>
