<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Traductor Alfabeto ElectrĂłnico</title>
<style>
    body {
        font-family: monospace;
        background-color: #0d0d0d;
        color: #00ffcc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }
    textarea {
        width: 90%;
        max-width: 600px;
        height: 120px;
        margin: 10px 0;
        font-size: 1.2em;
        background-color: #111;
        color: #00ffcc;
        border: 1px solid #00ffcc;
        padding: 10px;
    }
    select, button {
        padding: 10px;
        font-size: 1.1em;
        margin: 5px;
        cursor: pointer;
    }
    button {
        background-color: #00ffcc;
        color: #0d0d0d;
        border: none;
    }
    button:hover {
        background-color: #00ddb3;
    }
    #resultado {
        font-size: 1.2em;
        word-wrap: break-word;
        max-width: 90%;
        margin-top: 10px;
        background-color: #111;
        padding: 10px;
        border: 1px solid #00ffcc;
        min-height: 60px;
    }
</style>
</head>
<body>
<h2>Traductor Alfabeto ElectrĂłnico</h2>

<textarea id="entrada" placeholder="Escribe o pega aquĂ­ tu texto o cĂłdigos"></textarea>
<br>
<select id="modo">
    <option value="palabras-codigo">Palabras â†’ CĂłdigos</option>
    <option value="codigo-palabras">CĂłdigos â†’ Palabras</option>
</select>
<button onclick="traducirTexto()">Traducir</button>

<div id="resultado"></div>

<script>
const tabla = {
    'A':'âŠť','B':'âŠ—','C':'âŠˇ','D':'âŠ•','E':'âŠ›','F':'âŠ¤','G':'âŠ¦','H':'âŠŁ','I':'âŠ˘','J':'âŠ¤âŠť',
    'K':'âŠˇâŠ—','L':'âŠ•âŠ›','M':'âŠ—âŠŁ','N':'âŠˇâŠ¤','O':'âŠťâŠ•','P':'âŠ›âŠ¤','Q':'âŠ¦âŠ—','R':'âŠ˘âŠť','S':'âŠŁâŠˇ',
    'T':'âŠ¤âŠ—','U':'âŠťâŠŁ','V':'âŠ—âŠˇ','W':'âŠˇâŠ•','X':'âŠ•âŠ—','Y':'âŠ—âŠť','Z':'âŠŁâŠ—',
    '0':'âŠ™','1':'âŠš','2':'âŠ›âŠ—','3':'âŠ¤âŠˇ','4':'âŠťâŠ˘','5':'âŠˇâŠŁ','6':'âŠ•âŠ˘','7':'âŠ—âŠ¤','8':'âŠťâŠ¤','9':'âŠŁâŠ•',
    '.':'Â·',',':'â€š','?':'Âż','!':'Âˇ',' ':' '
};

// Crear la tabla inversa para traducir cĂłdigos â†’ palabras
const tablaInversa = {};
for (let key in tabla) {
    tablaInversa[tabla[key]] = key;
}

function traducirTexto() {
    const texto = document.getElementById('entrada').value;
    const modo = document.getElementById('modo').value;
    let resultado = '';

    if (modo === 'palabras-codigo') {
        for (let i = 0; i < texto.length; i++) {
            const c = texto[i].toUpperCase();
            resultado += tabla[c] || c;
        }
    } else { // cĂłdigo â†’ palabras
        let buffer = '';
        for (let i = 0; i < texto.length; i++) {
            buffer += texto[i];
            if (tablaInversa[buffer]) {
                resultado += tablaInversa[buffer];
                buffer = '';
            }
        }
        // Si queda algo que no coincide, se aĂ±ade tal cual
        if (buffer.length > 0) resultado += buffer;
    }

    document.getElementById('resultado').innerText = resultado;
}
</script>
</body>
</html>
