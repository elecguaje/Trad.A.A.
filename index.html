<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Traductor de Alfabeto Electr├│nico</title>
<style>
    body { font-family: monospace; background-color: #0d0d0d; color: #00ffcc; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    textarea { width: 90%; max-width: 600px; height: 120px; margin: 10px 0; font-size: 1.2em; background-color: #111; color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; }
    select, button { padding: 10px 20px; font-size: 1.2em; margin: 5px; background-color: #00ffcc; color: #0d0d0d; border: none; cursor: pointer; }
    button:hover, select:hover { background-color: #00ddb3; }
    #resultado { font-size: 1.4em; word-wrap: break-word; max-width: 90%; margin-top: 15px; }
</style>
</head>
<body>
<h2>Traductor de Alfabeto Electr├│nico</h2>
<select id="modo">
    <option value="letra-codigo">Letras тЖТ C├│digo</option>
    <option value="codigo-letra">C├│digo тЖТ Letras</option>
</select>
<textarea id="entrada" placeholder="Escribe o pega tu texto aqu├н"></textarea>
<button onclick="traducirTexto()">Traducir</button>
<div id="resultado"></div>

<script>
// Tabla de signos
const tabla = {
    'A':'тКХ','B':'тКЩ','C':'тКЫ','D':'тКЬ','E':'тКЭ','F':'тКЮ','G':'тКа','H':'тКг','I':'тКд','J':'тКж',
    'K':'тКи','L':'тКк','M':'тКм','N':'тКЧ','O':'тКШ','P':'тКЦ','Q':'тКЪ','R':'тКЫ╠╕','S':'тКЯ','T':'тКб',
    'U':'тКв','V':'тКе','W':'тКз','X':'тКй','Y':'тКл','Z':'тКн',
    '0':'тЧЙ','1':'тЧМ','2':'тЧО','3':'тЧС','4':'тЧУ','5':'тЧО','6':'тЧП','7':'тЧР','8':'тЧТ','9':'тЧФ',
    '.':'тЛЕ',',':'тАЪ','?':'тН░','!':'тН▒',' ':'тРг',
    '├Б':'тКХ','├Й':'тКЭ','├Н':'тКд','├У':'тКШ','├Ъ':'тКв','├С':'тКЧ'
};

// Generar tabla inversa (c├│digo тЖТ letra)
const tabla_inversa = {};
for(const key in tabla){
    tabla_inversa[tabla[key]] = key;
}

function traducirTexto() {
    const modo = document.getElementById('modo').value;
    const texto = document.getElementById('entrada').value;
    let resultado = '';

    if(modo === 'letra-codigo') {
        for(let i=0; i<texto.length; i++){
            const c = texto[i].toUpperCase();
            resultado += tabla[c] || c;
        }
    } else { // codigo-letra
        let buffer = '';
        for(let i=0; i<texto.length; i++){
            buffer += texto[i];
            if(tabla_inversa[buffer]) {
                resultado += tabla_inversa[buffer];
                buffer = '';
            } else if(buffer.length > 3) { // evitar bloqueo si no hay coincidencia
                resultado += buffer;
                buffer = '';
            }
        }
    }

    document.getElementById('resultado').innerText = resultado;
}
</script>
</body>
</html>
