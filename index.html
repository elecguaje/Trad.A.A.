<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Traductor Bidireccional Alfabeto ElectrГіnico</title>
<style>
    body { font-family: monospace; background-color: #0d0d0d; color: #00ffcc; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    textarea { width: 90%; max-width: 600px; height: 120px; margin: 10px 0; font-size: 1.2em; background-color: #111; color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; }
    select { padding: 10px; font-size: 1.1em; margin: 5px; background-color: #111; color: #00ffcc; border: 1px solid #00ffcc; }
    button { padding: 10px 20px; font-size: 1.2em; background-color: #00ffcc; color: #0d0d0d; border: none; cursor: pointer; margin: 5px; }
    button:hover { background-color: #00ddb3; }
    #resultado { font-size: 1.2em; word-wrap: break-word; max-width: 90%; margin-top: 10px; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>Traductor Bidireccional Alfabeto ElectrГіnico</h2>
<textarea id="entrada" placeholder="Escribe o pega aquГӯ tu texto"></textarea>
<div>
    <select id="modo">
        <option value="codificar">Palabras вҶ’ CГіdigo</option>
        <option value="decodificar">CГіdigo вҶ’ Palabras</option>
    </select>
    <button onclick="traducir()">Traducir</button>
</div>
<div id="resultado"></div>

<script>
// Tabla de codificaciГіn
const tabla = {
    'A':'вҹЎ','B':'вҢҒ','C':'вҠҡ','D':'вҢӮ','E':'вҹў','F':'вҠ№','G':'вҹЈ','H':'вҠ—','I':'вҹӮ','J':'вҢҮ',
    'K':'вҺқ','L':'вҺў','M':'вҺҡ','N':'вҺҷ','O':'вҸЈ','P':'вҺ—','Q':'вҚҫ','R':'вҺҳ','S':'вҢҒМё','T':'вҹҹ',
    'U':'вҠ”','V':'вҢө','W':'вҠ ','X':'вЁі','Y':'вҸҒ','Z':'вҢҶ',
    '0':'вҠҳ','1':'вҠұ','2':'вҠ°','3':'вҠІ','4':'вҠі','5':'вҠҙ','6':'вҠө','7':'вҠ¶','8':'вҠ·','9':'вҠё',
    '.':'В·',',':'вҖҡ','?':'вҚ°Мё','!':'вҚұМё','Вҝ':'вҚ°','ВЎ':'вҚұ',' ':' ',
    'ГҒ':'вҹЎ','Гү':'вҹў','ГҚ':'вҹӮ','Г“':'вҸЈ','Гҡ':'вҠ”','Г‘':'вҺҷ'
};

// Tabla inversa para decodificar automГЎticamente
const tablaInversa = {};
for (let letra in tabla) {
    tablaInversa[tabla[letra]] = letra;
}

// FunciГіn de traducciГіn
function traducir() {
    const modo = document.getElementById('modo').value;
    const texto = document.getElementById('entrada').value;
    let resultado = '';

    if (modo === 'codificar') {
        // De letras a cГіdigo
        for (let i = 0; i < texto.length; i++) {
            const c = texto[i].toUpperCase();
            resultado += tabla[c] || c;
        }
    } else if (modo === 'decodificar') {
        // De cГіdigo a letras
        for (let i = 0; i < texto.length; i++) {
            const c = texto[i];
            resultado += tablaInversa[c] || c;
        }
    }

    document.getElementById('resultado').innerText = resultado;
}
</script>
</body>
</html>
