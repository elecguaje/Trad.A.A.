<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Traductor Cifrado A.A.</title>

<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 30px;
}

textarea {
    width: 80%;
    height: 120px;
    margin: 10px;
    background: #111;
    color: white;
    border: 1px solid #444;
    padding: 10px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    background: white;
    border: none;
    cursor: pointer;
}
</style>

</head>
<body>

<h1>Traductor Cifrado A.A. (Nivel PRO)</h1>

<textarea id="input" placeholder="Escribe texto o código..."></textarea><br>

<button onclick="cifrar()">Cifrar →</button>
<button onclick="descifrar()">← Descifrar</button>

<textarea id="output" placeholder="Resultado..."></textarea>

<script>

// CIFRADO NO RECONOCIBLE (2 símbolos por letra)
const mapa = {
a:"§∆", b:"¶Ω", c:"♣¤", d:"♠¥", e:"★µ",
f:"☯π", g:"☢ß", h:"☣¶", i:"♛∆", j:"♜Ω",
k:"♞¤", l:"♟¥", m:"✦µ", n:"✧π", o:"✩ß",
p:"✪¶", q:"✫∆", r:"✬Ω", s:"✭¤", t:"✮¥",
u:"✯µ", v:"✰π", w:"✱ß", x:"✲¶", y:"✳∆",
z:"✴Ω", " ":"00"
};

// mapa inverso
const mapaInverso = {};
for (let letra in mapa) {
    mapaInverso[mapa[letra]] = letra;
}

function cifrar() {
    let texto = document.getElementById("input").value.toLowerCase();
    let resultado = "";

    for (let char of texto) {
        resultado += mapa[char] || char;
    }

    document.getElementById("output").value = resultado;
}

function descifrar() {
    let texto = document.getElementById("input").value;
    let resultado = "";

    // leer de 2 en 2
    for (let i = 0; i < texto.length; i += 2) {
        let bloque = texto.substring(i, i + 2);
        resultado += mapaInverso[bloque] || "?";
    }

    document.getElementById("output").value = resultado;
}

</script>

</body>
</html>
