<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trad.A.A.</title>
<style>
  body {
    font-family: monospace;
    background: #000;
    color: #fff;
    padding: 20px;
  }
  textarea {
    width: 100%;
    height: 150px;
    margin-bottom: 10px;
    font-size: 16px;
    background: #111;
    color: #fff;
    border: 1px solid #444;
    padding: 10px;
  }
  select, button {
    font-size: 16px;
    margin-right: 10px;
    padding: 5px;
  }
</style>
</head>
<body>

<h2>Trad.A.A.</h2>

<select id="direction">
  <option value="decode" selected>Código → Texto</option>
  <option value="encode">Texto → Código</option>
</select>

<br><br>

<textarea id="input" placeholder="Pega aquí el código o el texto..."></textarea>

<button onclick="translate()">Traducir</button>

<textarea id="output" placeholder="Resultado" readonly></textarea>

<script>

// CIFRADO (2 letras = 1 código)
const mapa = {
  A:"ka", B:"zu", C:"mi", D:"po", E:"ra", F:"te", G:"vi", H:"lo", I:"na",
  J:"se", K:"di", L:"xo", M:"cu", N:"we", O:"qy", P:"gb", Q:"hj", R:"fk",
  S:"tr", T:"zz", U:"pl", V:"mn", W:"bv", X:"cx", Y:"lk", Z:"jh",

  " ":"__",
  ".":"..",
  ",":",,",
  "?":"??",
  "!":"!!"
};

// inverso
const mapaInv = {};
for (let k in mapa) {
  mapaInv[mapa[k]] = k;
}

function translate(){
  const input = document.getElementById("input").value;
  const mode = document.getElementById("direction").value;
  let result = "";

  if(mode === "encode"){
    for(let char of input.toUpperCase()){
      result += mapa[char] || char;
    }
  } else {
    for(let i = 0; i < input.length; i += 2){
      let bloque = input.substr(i,2);
      result += mapaInv[bloque] || "";
    }
  }

  document.getElementById("output").value = result;
}

</script>

</body>
</html>
